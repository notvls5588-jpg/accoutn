<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ໜ້າຮ້ານ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#faf7f2; --warm:#f5efe6; --brown:#2c1810; --gold:#c9a84c;
  --gold2:#e8c96d; --rust:#b85c2a; --sage:#4a7c59; --slate:#3d4f5c;
  --white:#ffffff; --gray:#8a8a8a; --lgray:#f0ece6;
  --shadow:0 4px 24px rgba(44,24,16,.10);
  --shadow2:0 12px 48px rgba(44,24,16,.16);
  --r:16px; --rs:10px;
  --font-head:'Playfair Display',serif;
  --font:'DM Sans','Noto Sans Lao',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--cream);color:var(--brown);min-height:100vh;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}

/* HEADER */
.header{
  background:var(--white);border-bottom:1px solid rgba(201,168,76,.2);
  padding:0 24px;height:72px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
}
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-img{width:48px;height:48px;border-radius:12px;object-fit:cover;display:none;}
.logo-img.show{display:block;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--gold),var(--rust));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.shop-name{font-family:var(--font-head);font-size:20px;color:var(--brown);line-height:1.2;}
.shop-tagline{font-size:11px;color:var(--gray);font-weight:400;}
.header-space{flex:1;}
.cart-btn{
  display:flex;align-items:center;gap:10px;background:var(--gold);
  color:var(--brown);border:none;padding:10px 20px;border-radius:50px;
  font-size:13px;font-family:var(--font);font-weight:700;cursor:pointer;
  transition:.2s;box-shadow:0 3px 12px rgba(201,168,76,.35);position:relative;
}
.cart-btn:hover{background:var(--gold2);transform:translateY(-1px);}
.cart-badge{
  background:var(--rust);color:white;border-radius:50%;width:20px;height:20px;
  font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
}

/* HERO BANNER */
.hero{
  background:linear-gradient(135deg,var(--brown) 0%,var(--rust) 50%,var(--gold) 100%);
  padding:48px 24px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero h1{font-family:var(--font-head);font-size:clamp(24px,5vw,42px);color:var(--white);margin-bottom:8px;position:relative;}
.hero p{font-size:14px;color:rgba(255,255,255,.8);position:relative;}

/* FILTER BAR */
.filter-bar{
  background:var(--white);padding:16px 24px;display:flex;gap:10px;
  overflow-x:auto;border-bottom:1px solid var(--lgray);
  scrollbar-width:none;position:sticky;top:72px;z-index:99;
}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-pill{
  padding:7px 18px;border-radius:50px;border:1.5px solid var(--lgray);
  background:var(--white);font-size:12px;font-family:var(--font);
  font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;color:var(--gray);
}
.filter-pill.on{background:var(--gold);border-color:var(--gold);color:var(--brown);}
.filter-pill:hover:not(.on){border-color:var(--gold);color:var(--brown);}
.filter-space{flex:1;min-width:12px;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--lgray);border-radius:50px;padding:8px 16px;min-width:180px;}
.search-wrap input{border:none;background:none;font-size:12px;font-family:var(--font);outline:none;color:var(--brown);flex:1;}

/* PRODUCT GRID */
.main{padding:24px;max-width:1300px;margin:0 auto;}
.section-title{font-family:var(--font-head);font-size:22px;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--lgray),transparent);}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;margin-bottom:40px;}
.prod-card{
  background:var(--white);border-radius:20px;overflow:hidden;
  box-shadow:var(--shadow);transition:.3s;cursor:pointer;
  border:1.5px solid transparent;
}
.prod-card:hover{transform:translateY(-5px);box-shadow:var(--shadow2);border-color:rgba(201,168,76,.3);}
.prod-img-wrap{height:200px;background:var(--lgray);position:relative;overflow:hidden;}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;transition:.4s;}
.prod-card:hover .prod-img-wrap img{transform:scale(1.05);}
.prod-img-wrap .emoji-fallback{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:70px;background:linear-gradient(135deg,var(--lgray),var(--warm));
}
.stock-pill{
  position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:50px;
  font-size:9px;font-weight:800;backdrop-filter:blur(8px);
}
.stock-ok{background:rgba(74,124,89,.9);color:#fff;}
.stock-low{background:rgba(245,158,11,.9);color:#fff;}
.stock-out{background:rgba(184,92,42,.9);color:#fff;}
.prod-body{padding:16px;}
.prod-cat{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.prod-name{font-size:14px;font-weight:700;color:var(--brown);margin-bottom:3px;line-height:1.3;}
.prod-desc{font-size:11px;color:var(--gray);margin-bottom:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.prod-foot{display:flex;align-items:center;justify-content:space-between;}
.prod-price-wrap{}
.prod-price{font-family:var(--font-head);font-size:20px;color:var(--rust);font-weight:700;}
.prod-unit{font-size:10px;color:var(--gray);}
.add-btn{
  width:38px;height:38px;border-radius:50%;background:var(--gold);
  border:none;cursor:pointer;font-size:20px;color:var(--brown);
  display:flex;align-items:center;justify-content:center;
  transition:.2s;box-shadow:0 3px 10px rgba(201,168,76,.4);
}
.add-btn:hover{background:var(--gold2);transform:scale(1.12);}
.add-btn:disabled{background:var(--lgray);color:var(--gray);cursor:default;transform:none;box-shadow:none;}

/* CART DRAWER */
.cart-ovl{position:fixed;inset:0;background:rgba(44,24,16,.5);z-index:400;display:none;backdrop-filter:blur(4px);}
.cart-ovl.on{display:block;}
.cart-draw{
  position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--white);
  z-index:401;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 48px rgba(44,24,16,.2);
}
.cart-draw.on{transform:none;}
.cart-hdr{padding:20px 24px;border-bottom:1px solid var(--lgray);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cart-hdr h2{font-family:var(--font-head);font-size:20px;}
.close-btn{background:var(--lgray);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;color:var(--brown);display:flex;align-items:center;justify-content:center;transition:.2s;}
.close-btn:hover{background:var(--warm);}
.cart-list{flex:1;overflow-y:auto;padding:16px 24px;}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--lgray);}
.ci-img{width:60px;height:60px;border-radius:12px;object-fit:cover;background:var(--lgray);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;}
.ci-img img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.ci-info{flex:1;}
.ci-name{font-size:13px;font-weight:700;color:var(--brown);margin-bottom:3px;}
.ci-price-u{font-size:10px;color:var(--gray);}
.ci-ctrl{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--lgray);background:var(--white);font-size:14px;cursor:pointer;color:var(--brown);display:flex;align-items:center;justify-content:center;transition:.2s;font-weight:700;}
.qty-btn:hover{border-color:var(--gold);background:var(--warm);}
.qty-num{font-size:13px;font-weight:800;min-width:22px;text-align:center;}
.del-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--gray);font-size:16px;transition:.2s;}
.del-btn:hover{color:var(--rust);}
.ci-total{font-size:14px;font-weight:800;color:var(--rust);align-self:center;flex-shrink:0;}
.cart-empty{text-align:center;padding:60px 20px;color:var(--gray);}
.cart-empty-icon{font-size:64px;opacity:.4;margin-bottom:12px;}

/* CART FOOTER */
.cart-foot{padding:20px 24px;border-top:1px solid var(--lgray);flex-shrink:0;background:var(--cream);}
.cart-summary{margin-bottom:16px;}
.cs-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--gray);}
.cs-total{font-size:17px;font-weight:800;color:var(--brown);border-top:2px solid var(--lgray);margin-top:8px;padding-top:10px;}
.checkout-btn{
  width:100%;padding:16px;background:linear-gradient(135deg,var(--brown),var(--rust));
  color:var(--white);border:none;border-radius:50px;font-size:15px;
  font-family:var(--font-head);font-weight:700;cursor:pointer;
  transition:.2s;letter-spacing:.3px;
}
.checkout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(44,24,16,.25);}

/* PAYMENT MODAL */
.modal-ovl{position:fixed;inset:0;background:rgba(44,24,16,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.modal-ovl.on{display:flex;}
.modal-box{background:var(--white);border-radius:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(44,24,16,.35);}
.modal-hdr{padding:20px 24px;border-bottom:1px solid var(--lgray);display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h3{font-family:var(--font-head);font-size:20px;}
.modal-body{padding:24px;}

/* PAYMENT TABS */
.pay-tabs{display:flex;gap:8px;margin-bottom:20px;}
.pay-tab{flex:1;padding:10px;border-radius:12px;border:2px solid var(--lgray);background:var(--white);font-size:12px;font-family:var(--font);font-weight:700;cursor:pointer;transition:.2s;text-align:center;color:var(--gray);}
.pay-tab.on{border-color:var(--gold);background:rgba(201,168,76,.08);color:var(--brown);}

/* BANK CARD */
.bank-card{
  background:linear-gradient(135deg,var(--brown),var(--slate));
  border-radius:18px;padding:24px;color:white;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.bank-card::before{content:'●●●●';position:absolute;top:-20px;right:-20px;font-size:80px;opacity:.05;letter-spacing:10px;}
.bank-name{font-size:11px;opacity:.7;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
.bank-num{font-size:22px;font-weight:800;letter-spacing:3px;margin-bottom:12px;font-family:monospace;}
.bank-holder{font-size:13px;font-weight:600;opacity:.9;}
.bank-logo{position:absolute;top:20px;right:20px;background:var(--gold);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;}

/* QR AREA */
.qr-area{text-align:center;padding:16px;background:var(--lgray);border-radius:16px;margin-bottom:16px;}
.qr-placeholder{width:180px;height:180px;background:white;border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}

/* ORDER SUMMARY IN MODAL */
.order-summary{background:var(--warm);border-radius:12px;padding:16px;margin-bottom:16px;}
.order-item{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--slate);}
.order-total{display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:var(--brown);border-top:1px solid rgba(201,168,76,.3);margin-top:8px;padding-top:10px;}

/* CONFIRM BTN */
.confirm-btn{
  width:100%;padding:15px;background:var(--gold);color:var(--brown);
  border:none;border-radius:50px;font-size:14px;font-family:var(--font);
  font-weight:800;cursor:pointer;transition:.2s;
}
.confirm-btn:hover{background:var(--gold2);transform:translateY(-1px);}

/* SUCCESS */
.success-screen{text-align:center;padding:32px;}
.success-icon{font-size:72px;margin-bottom:16px;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--brown);color:var(--white);padding:10px 22px;border-radius:50px;
  font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:.3s;
  pointer-events:none;white-space:nowrap;box-shadow:var(--shadow2);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:var(--gray);}

/* RESPONSIVE */
@media(max-width:600px){
  .header{padding:0 16px;height:60px;}
  .hero{padding:32px 16px;}
  .main{padding:16px;}
  .prod-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .cart-draw{width:100%;border-radius:20px 20px 0 0;top:auto;border:none;}
  .filter-bar{padding:12px 16px;}
}
@media(max-width:360px){
  .prod-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-area">
    <img class="logo-img" id="logoImg" src="" alt="logo"/>
    <div class="logo-icon" id="logoIcon">🏪</div>
    <div>
      <div class="shop-name" id="shopNameDisplay">ShopPro</div>
      <div class="shop-tagline" id="shopTaglineDisplay">ລາຄາດີ ສິນຄ້າດີ</div>
    </div>
  </div>
  <div class="header-space"></div>
  <button class="cart-btn" onclick="openCart()">
    🛒 ກະຕ່າ
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</div>

<div class="hero">
  <h1 id="heroBannerTitle">ຍິນດີຕ້ອນຮັບ</h1>
  <p id="heroBannerSub">ເລືອກຊື້ສິນຄ້າຄຸນນະພາບດີ ລາຄາຍຸດທິທຳ</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-pill on" onclick="filterCat('',this)">ທຸກໝວດ</button>
  <div class="filter-space"></div>
  <div class="search-wrap">
    <span>🔍</span>
    <input id="searchInput" placeholder="ຄົ້ນຫາສິນຄ້າ..." oninput="renderProducts()"/>
  </div>
</div>

<div class="main">
  <div class="section-title">✨ ສິນຄ້າທັງໝົດ</div>
  <div class="prod-grid" id="prodGrid"></div>
</div>

<!-- CART -->
<div class="cart-ovl" id="cartOvl" onclick="closeCart()"></div>
<div class="cart-draw" id="cartDraw">
  <div class="cart-hdr">
    <h2>🛒 ກະຕ່າ</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-foot" id="cartFoot"></div>
</div>

<!-- PAYMENT MODAL -->
<div class="modal-ovl" id="payModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3>💳 ຊຳລະເງິນ</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ── SHARED DB ──
const STORE_KEY = 'shoppro_v2';
function loadDB() { try { const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):null; } catch(e){return null;} }
function saveDB() { try { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); } catch(e){} }

function defaultDB() {
  return {
    settings:{
      shopName:'ShopPro',shopTagline:'ລາຄາດີ ສິນຄ້າດີ',
      phone:'020 xxxx xxxx',address:'ວຽງຈັນ, ລາວ',
      username:'admin',password:'admin123',
      logoUrl:'',
      bankName:'BCEL Bank',bankAccount:'010-02-001234-01',bankHolder:'ທ. ສົມຊາຍ ວົງສາ',
      promptpayName:'ທ. ສົມຊາຍ',
      heroBannerTitle:'ຍິນດີຕ້ອນຮັບ',heroBannerSub:'ເລືອກຊື້ສິນຄ້າຄຸນນະພາບດີ ລາຄາຍຸດທິທຳ',
    },
    products:[
      {id:1,sku:'PRD-001',name:'ນ້ຳດື່ມ 1.5L',cat:'ເຄື່ອງດື່ມ',icon:'💧',imageUrl:'',cost:3000,price:5000,unit:'ຂວດ',stock:120,minStock:20,desc:'ນ້ຳດື່ມສຸດ ຂວດໃຫຍ່'},
      {id:2,sku:'PRD-002',name:'ເຂົ້າໜຽວ 5ກກ',cat:'ສ່ານ',icon:'🌾',imageUrl:'',cost:28000,price:35000,unit:'ຖົງ',stock:45,minStock:10,desc:'ເຂົ້າໜຽວ ຄຸນນະພາບດີ'},
      {id:3,sku:'PRD-003',name:'ນ້ຳມັນ 1L',cat:'ສ່ານ',icon:'🫙',imageUrl:'',cost:18000,price:22000,unit:'ຂວດ',stock:60,minStock:15,desc:'ນ້ຳມັນພືດ ຄຸນນະພາບດີ'},
      {id:4,sku:'PRD-004',name:'ສົ້ມ',cat:'ຜັກ-ໝາກໄມ້',icon:'🍊',imageUrl:'',cost:8000,price:12000,unit:'ກິໂລ',stock:8,minStock:10,desc:'ສົ້ມ ສົດ ຈາກສວນ'},
      {id:5,sku:'PRD-005',name:'ເກືອ ຜົງ',cat:'ເຄື່ອງປຸງ',icon:'🧂',imageUrl:'',cost:5000,price:8000,unit:'ຖົງ',stock:35,minStock:10,desc:'ເກືອ ຜົງ ດ້ານ'},
      {id:6,sku:'PRD-006',name:'ນ້ຳຊອດ',cat:'ເຄື່ອງປຸງ',icon:'🍶',imageUrl:'',cost:12000,price:16000,unit:'ຂວດ',stock:4,minStock:8,desc:'ນ້ຳຊອດ ເດັດ'},
    ],
    sales:[], finance:[], stockLog:[],
    nPid:7, nSid:1, nFid:1
  };
}
let DB = loadDB() || defaultDB();
// Migrate old DB
if(!DB.settings.shopTagline) DB.settings.shopTagline='ລາຄາດີ ສິນຄ້າດີ';
if(!DB.settings.logoUrl) DB.settings.logoUrl='';
if(!DB.settings.bankName) DB.settings.bankName='BCEL Bank';
if(!DB.settings.bankAccount) DB.settings.bankAccount='010-02-001234-01';
if(!DB.settings.bankHolder) DB.settings.bankHolder='ທ. ສົມຊາຍ ວົງສາ';
if(!DB.settings.heroBannerTitle) DB.settings.heroBannerTitle='ຍິນດີຕ້ອນຮັບ';
if(!DB.settings.heroBannerSub) DB.settings.heroBannerSub='ເລືອກຊື້ສິນຄ້າຄຸນນະພາບດີ ລາຄາຍຸດທິທຳ';
if(!DB.settings.promptpayName) DB.settings.promptpayName='';
DB.products.forEach(p=>{if(!p.imageUrl)p.imageUrl='';});

let cart=[];
let activeCat='';

function fmt(n){return Number(n||0).toLocaleString('lo-LA');}
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2500);
}
function updateBadge(){
  const n=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('cartBadge').textContent=n;
}

function initStore(){
  const s=DB.settings;
  document.getElementById('shopNameDisplay').textContent=s.shopName||'ShopPro';
  document.getElementById('shopTaglineDisplay').textContent=s.shopTagline||'';
  document.getElementById('heroBannerTitle').textContent=s.heroBannerTitle||'ຍິນດີຕ້ອນຮັບ';
  document.getElementById('heroBannerSub').textContent=s.heroBannerSub||'';
  if(s.logoUrl){
    document.getElementById('logoImg').src=s.logoUrl;
    document.getElementById('logoImg').classList.add('show');
    document.getElementById('logoIcon').style.display='none';
  }
  buildCatFilter();
  renderProducts();
}

function buildCatFilter(){
  const cats=[...new Set(DB.products.map(p=>p.cat))];
  const bar=document.getElementById('filterBar');
  const search=bar.querySelector('.search-wrap');
  const space=bar.querySelector('.filter-space');
  // Remove old cat pills
  bar.querySelectorAll('.filter-pill').forEach(el=>el.remove());
  const all=document.createElement('button');
  all.className='filter-pill on';all.textContent='ທຸກໝວດ';
  all.onclick=function(){filterCat('',this);};
  bar.insertBefore(all,bar.firstChild);
  cats.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-pill';btn.textContent=c;
    btn.onclick=function(){filterCat(c,this);};
    bar.insertBefore(btn,space);
  });
}
function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderProducts();
}

function renderProducts(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const list=DB.products.filter(p=>
    (!activeCat||p.cat===activeCat)&&
    (!q||p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q))
  );
  const grid=document.getElementById('prodGrid');
  if(!list.length){
    grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div style="font-size:64px;opacity:.3">🔍</div><p style="margin-top:12px">ບໍ່ພົບສິນຄ້າ</p></div>';
    return;
  }
  const inCart={};
  cart.forEach(c=>inCart[c.id]=c.qty);
  grid.innerHTML=list.map(p=>{
    const sc=p.stock===0?'stock-out':p.stock<=p.minStock?'stock-low':'stock-ok';
    const sl=p.stock===0?'ໝົດ':p.stock<=p.minStock?`⚠ ${p.stock} ${p.unit} ເຫຼືອ`:`✓ ມີ`;
    const hasImg=p.imageUrl&&p.imageUrl.length>0;
    return `<div class="prod-card" onclick="showProduct(${p.id})">
      <div class="prod-img-wrap">
        ${hasImg?`<img src="${p.imageUrl}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>`:``}
        <div class="emoji-fallback" style="${hasImg?'display:none':''}"><span>${p.icon||'📦'}</span></div>
        <span class="stock-pill ${sc}">${sl}</span>
        ${inCart[p.id]?`<span style="position:absolute;top:10px;right:10px;background:var(--gold);color:var(--brown);border-radius:50%;width:24px;height:24px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center">×${inCart[p.id]}</span>`:''}
      </div>
      <div class="prod-body">
        <div class="prod-cat">${p.cat}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-desc">${p.desc||''}</div>
        <div class="prod-foot">
          <div class="prod-price-wrap">
            <div class="prod-price">${fmt(p.price)} ₭</div>
            <div class="prod-unit">ຕໍ່ ${p.unit}</div>
          </div>
          <button class="add-btn" ${p.stock===0?'disabled':''} onclick="event.stopPropagation();addToCart(${p.id})">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function addToCart(id){
  const p=DB.products.find(x=>x.id===id);
  if(!p||p.stock===0)return;
  const ex=cart.find(c=>c.id===id);
  if(ex){if(ex.qty>=p.stock){toast('⚠ ສ່ານ ບໍ່ພໍ');return;}ex.qty++;}
  else cart.push({id:p.id,sku:p.sku,name:p.name,icon:p.icon||'📦',imageUrl:p.imageUrl||'',price:p.price,cost:p.cost,unit:p.unit,qty:1});
  updateBadge();renderProducts();toast(`✅ ເພີ່ມ ${p.name}`);
}

function showProduct(id){
  const p=DB.products.find(x=>x.id===id);if(!p)return;
  const inCart=cart.find(c=>c.id===id);
  const hasImg=p.imageUrl&&p.imageUrl.length>0;
  const sc=p.stock===0?'stock-out':p.stock<=p.minStock?'stock-low':'stock-ok';
  document.getElementById('modalBody').innerHTML=`
    <div style="margin-bottom:16px;border-radius:16px;overflow:hidden;height:220px;background:var(--lgray);position:relative;display:flex;align-items:center;justify-content:center;">
      ${hasImg?`<img src="${p.imageUrl}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>`:''}
      <div style="position:absolute;font-size:80px">${p.icon||'📦'}</div>
    </div>
    <div class="prod-cat">${p.cat} · ${p.sku}</div>
    <div style="font-family:var(--font-head);font-size:22px;font-weight:700;margin:6px 0 4px">${p.name}</div>
    <div style="font-size:12px;color:var(--gray);margin-bottom:14px;line-height:1.5">${p.desc||'-'}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--warm);border-radius:12px;padding:14px 16px;margin-bottom:16px">
      <div>
        <div style="font-size:11px;color:var(--gray)">ລາຄາ</div>
        <div style="font-family:var(--font-head);font-size:28px;color:var(--rust);font-weight:700">${fmt(p.price)} ₭</div>
        <div style="font-size:11px;color:var(--gray)">ຕໍ່ ${p.unit}</div>
      </div>
      <span class="stock-pill ${sc} " style="position:static;font-size:11px">${p.stock===0?'ໝົດ':p.stock<=p.minStock?`⚠ ${p.stock} ເຫຼືອ`:`✓ ${p.stock} ${p.unit}`}</span>
    </div>
    ${p.stock>0?`<button class="checkout-btn" style="margin-bottom:8px" onclick="addToCart(${p.id});closeModal()">${inCart?`✅ ເພີ່ມອີກ (×${inCart.qty} ໃນກະຕ່າ)`:'🛒 ເພີ່ມໃສ່ກະຕ່າ'}</button>`
    :'<button disabled class="checkout-btn" style="background:var(--lgray);color:var(--gray);cursor:default">❌ ສິນຄ້າໝົດ</button>'}
    <button class="close-btn" style="width:100%;border-radius:50px;height:40px;background:var(--lgray)" onclick="closeModal()">ປິດ</button>`;
  document.getElementById('payModal').classList.add('on');
}

function openCart(){
  document.getElementById('cartOvl').classList.add('on');
  document.getElementById('cartDraw').classList.add('on');
  renderCart();
}
function closeCart(){
  document.getElementById('cartOvl').classList.remove('on');
  document.getElementById('cartDraw').classList.remove('on');
}
function renderCart(){
  const cl=document.getElementById('cartList');
  const cf=document.getElementById('cartFoot');
  if(!cart.length){
    cl.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>ກະຕ່າຫວ່າງ</p></div>`;
    cf.innerHTML='';return;
  }
  cl.innerHTML=cart.map(c=>{
    const hasImg=c.imageUrl&&c.imageUrl.length>0;
    return `<div class="cart-item">
      <div class="ci-img">
        ${hasImg?`<img src="${c.imageUrl}" alt="${c.name}" onerror="this.style.display='none'"/>`:''}
        <span ${hasImg?'style="display:none"':''}>${c.icon}</span>
      </div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-price-u">${fmt(c.price)} ₭ / ໜ່ວຍ</div>
        <div class="ci-ctrl">
          <button class="qty-btn" onclick="cqty(${c.id},-1)">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="cqty(${c.id},1)">+</button>
          <button class="del-btn" onclick="cremove(${c.id})">🗑</button>
        </div>
      </div>
      <div class="ci-total">${fmt(c.price*c.qty)} ₭</div>
    </div>`;
  }).join('');
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  cf.innerHTML=`<div class="cart-summary">
    ${cart.map(c=>`<div class="cs-row"><span>${c.name} ×${c.qty}</span><span>${fmt(c.price*c.qty)} ₭</span></div>`).join('')}
    <div class="cs-row cs-total"><span>ຍອດລວມ</span><span>${fmt(total)} ₭</span></div>
  </div>
  <button class="checkout-btn" onclick="openPayment()">💳 ໄປຊຳລະ ${fmt(total)} ₭</button>`;
}
function cqty(id,d){
  const c=cart.find(x=>x.id===id);if(!c)return;
  const p=DB.products.find(x=>x.id===id);
  if(d>0&&c.qty>=p.stock){toast('⚠ ສ່ານ ບໍ່ພໍ');return;}
  c.qty+=d;if(c.qty<=0)cart=cart.filter(x=>x.id!==id);
  updateBadge();renderCart();renderProducts();
}
function cremove(id){cart=cart.filter(x=>x.id!==id);updateBadge();renderCart();renderProducts();}

// PAYMENT
let payMode='bank';
function openPayment(){
  if(!cart.length)return;
  closeCart();
  renderPayModal();
  document.getElementById('payModal').classList.add('on');
}
function closeModal(){document.getElementById('payModal').classList.remove('on');}

function renderPayModal(){
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const s=DB.settings;
  document.getElementById('modalBody').innerHTML=`
    <div class="order-summary">
      ${cart.map(c=>`<div class="order-item"><span>${c.name} ×${c.qty}</span><span>${fmt(c.price*c.qty)} ₭</span></div>`).join('')}
      <div class="order-total"><span>ຍອດລວມ</span><span>${fmt(total)} ₭</span></div>
    </div>
    <div class="pay-tabs">
      <button class="pay-tab ${payMode==='bank'?'on':''}" onclick="setPayMode('bank')">🏦 ໂອນເງິນ</button>
      <button class="pay-tab ${payMode==='qr'?'on':''}" onclick="setPayMode('qr')">📱 QR Code</button>
      <button class="pay-tab ${payMode==='cash'?'on':''}" onclick="setPayMode('cash')">💵 ເງິນສົດ</button>
    </div>
    <div id="payContent"></div>
    <button class="confirm-btn" onclick="confirmPayment()">✅ ຢືນຢັນ ໄດ້ຮັບເງິນ</button>`;
  renderPayContent(total);
}
function setPayMode(m){payMode=m;const total=cart.reduce((s,c)=>s+c.price*c.qty,0);document.querySelectorAll('.pay-tab').forEach(t=>t.classList.remove('on'));event.currentTarget.classList.add('on');renderPayContent(total);}
function renderPayContent(total){
  const s=DB.settings;
  const el=document.getElementById('payContent');
  if(payMode==='bank'){
    el.innerHTML=`
      <div class="bank-card">
        <div class="bank-logo">🏦</div>
        <div class="bank-name">${s.bankName||'Bank'}</div>
        <div class="bank-num">${(s.bankAccount||'').replace(/-/g,' ')}</div>
        <div class="bank-holder">${s.bankHolder||''}</div>
      </div>
      <div style="background:rgba(201,168,76,.1);border:1.5px solid var(--gold);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
        <div style="font-size:12px;color:var(--gray);margin-bottom:4px">ຍອດທີ່ຕ້ອງໂອນ</div>
        <div style="font-family:var(--font-head);font-size:28px;color:var(--rust);font-weight:700">${fmt(total)} ₭</div>
      </div>
      <div style="font-size:11px;color:var(--gray);text-align:center;margin-bottom:16px">ໂອນເງິນແລ້ວ ກົດ "ຢືນຢັນ" ເພື່ອສຳເລັດ</div>`;
  } else if(payMode==='qr'){
    el.innerHTML=`
      <div class="qr-area">
        <div class="qr-placeholder" id="qrDiv"></div>
        <div style="font-size:12px;font-weight:700;color:var(--brown)">${s.bankHolder||s.promptpayName||''}</div>
        <div style="font-size:11px;color:var(--gray);margin-top:4px">${s.bankAccount||''}</div>
        <div style="font-family:var(--font-head);font-size:24px;color:var(--rust);font-weight:700;margin-top:8px">${fmt(total)} ₭</div>
      </div>
      <div style="font-size:11px;color:var(--gray);text-align:center;margin-bottom:16px">ສະແກນ QR ແລ້ວ ກົດ "ຢືນຢັນ"</div>`;
    setTimeout(()=>{
      try{new QRCode(document.getElementById('qrDiv'),{text:`PAY|${s.bankAccount}|${s.bankHolder}|${total}`,width:160,height:160,colorDark:'#2c1810',colorLight:'#faf7f2'});}catch(e){}
    },50);
  } else {
    el.innerHTML=`
      <div style="text-align:center;padding:24px;background:var(--warm);border-radius:16px;margin-bottom:16px">
        <div style="font-size:64px;margin-bottom:8px">💵</div>
        <div style="font-size:12px;color:var(--gray)">ຍອດທີ່ຕ້ອງຊຳລະ</div>
        <div style="font-family:var(--font-head);font-size:32px;color:var(--rust);font-weight:700">${fmt(total)} ₭</div>
      </div>
      <div style="font-size:11px;color:var(--gray);text-align:center;margin-bottom:16px">ຮັບເງິນສົດ ກ່ອນ ກົດ "ຢືນຢັນ"</div>`;
  }
}
function confirmPayment(){
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const cost=cart.reduce((s,c)=>s+c.cost*c.qty,0);
  const profit=total-cost;
  const sale={
    id:DB.nSid++,time:new Date().toISOString(),
    items:cart.map(c=>({id:c.id,sku:c.sku,name:c.name,qty:c.qty,price:c.price,cost:c.cost})),
    total,cost,profit,payMethod:payMode,user:'customer'
  };
  DB.sales.push(sale);
  cart.forEach(c=>{
    const p=DB.products.find(x=>x.id===c.id);
    if(p){p.stock=Math.max(0,p.stock-c.qty);
      DB.stockLog.push({time:new Date().toISOString(),prodId:p.id,sku:p.sku,name:p.name,type:'out',qty:-c.qty,note:'ຂາຍ #'+sale.id});}
  });
  DB.finance.push({id:DB.nFid++,type:'income',cat:'ຂາຍສິນຄ້າ',desc:'ຂາຍ #'+sale.id+' ('+payMode+')',amount:total,time:new Date().toISOString()});
  saveDB();
  const items=[...cart];
  cart=[];updateBadge();renderProducts();
  document.getElementById('modalBody').innerHTML=`
    <div class="success-screen">
      <div class="success-icon">🎉</div>
      <div style="font-family:var(--font-head);font-size:24px;color:var(--brown);margin-bottom:8px">ຊຳລະ ສຳເລັດ!</div>
      <div style="font-size:13px;color:var(--gray);margin-bottom:16px">ຂໍຂອບໃຈ ທີ່ໃຊ້ບໍລິການ</div>
      <div style="background:var(--warm);border-radius:12px;padding:16px;margin-bottom:20px;text-align:left">
        <div style="font-size:11px;font-weight:700;color:var(--brown);margin-bottom:8px">ໃບເກີດ #${sale.id}</div>
        ${items.map(c=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span>${c.name} ×${c.qty}</span><span>${fmt(c.price*c.qty)} ₭</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;color:var(--rust);border-top:1px solid rgba(201,168,76,.3);margin-top:8px;padding-top:8px"><span>ທັງໝົດ</span><span>${fmt(total)} ₭</span></div>
      </div>
      <button class="confirm-btn" onclick="closeModal()">ປິດ</button>
    </div>`;
}

// Poll for DB changes (live sync with admin)
setInterval(()=>{
  const fresh=loadDB();
  if(fresh&&JSON.stringify(fresh.products)!==JSON.stringify(DB.products)){
    DB=fresh;renderProducts();buildCatFilter();
  }
  if(fresh&&JSON.stringify(fresh.settings)!==JSON.stringify(DB.settings)){
    DB=fresh;initStore();
  }
},3000);

initStore();
</script>
</body>
</html>
